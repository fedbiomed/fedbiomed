# Fed-BioMed nginx configuration for non-root execution
user ${FEDBIOMED_USER};
worker_processes auto;
error_log /home/${FEDBIOMED_USER}/nginx/logs/error.log;
access_log /home/${FEDBIOMED_USER}/nginx/logs/access.log;

events {
    worker_connections 1024;
}

http {
    
    log_format main '${DOLLAR}remote_addr - ${DOLLAR}remote_user [${DOLLAR}time_local] "${DOLLAR}request" '
                    '${DOLLAR}status ${DOLLAR}body_bytes_sent "${DOLLAR}http_referer" '
                    '"${DOLLAR}http_user_agent" "${DOLLAR}http_x_forwarded_for"';

    access_log /home/${FEDBIOMED_USER}/nginx/logs/access.log main;
    error_log /home/${FEDBIOMED_USER}/nginx/logs/error.log;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Include site configuration
    include /etc/nginx/conf.d/*.conf;
}
