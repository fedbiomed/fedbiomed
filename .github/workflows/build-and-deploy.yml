name: Build and deploy docs to fedbiomed-docs-public

on:
  push:
    branches:
      - feature/new-docs-template-and-build-process
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build (ex. 6.0.0)"
        required: true
      alias:
        description: "Alias (ex. latest)"
        required: false
        default: ""

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout fedbiomed-docs (source)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout fedbiomed-docs-public (destination)
        uses: actions/checkout@v4
        with:
          repository: fedbiomed/fedbiomed-docs-public
          ssh-key: ${{ secrets.DOCS_PUBLIC_DEPLOY_KEY }}
          path: output-repo

      - name: Add fedbiomed to PYTHONPATH
        run: echo "PYTHONPATH=$PYTHONPATH:$(pwd)" >> $GITHUB_ENV

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install mike

      - name: Configure git
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "fedbiomed-bot@users.noreply.github.com"

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
            ALIAS="${{ github.event.inputs.alias }}"
          elif [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
            ALIAS="latest"
          else
            VERSION="dev"
            ALIAS=""
          fi
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
          echo "ALIAS=${ALIAS}" >> $GITHUB_OUTPUT

      - name: Build docs with mike
        run: |
          mike deploy ${{ steps.version.outputs.VERSION }} ${{ steps.version.outputs.ALIAS }} \
            --update-aliases \
            --deploy-prefix output-repo
          if [ -n "${{ steps.version.outputs.ALIAS }}" ]; then
            mike set-default ${{ steps.version.outputs.ALIAS }} --deploy-prefix output-repo
          else
            mike set-default ${{ steps.version.outputs.VERSION }} --deploy-prefix output-repo
          fi

      - name: Restore CNAME
        run: echo "docs.fedbiomed.org" > output-repo/CNAME

      - name: Push to fedbiomed-docs-public
        run: |
          cd output-repo
          git add .
          if git diff --cached --quiet; then
            echo "Nessuna modifica da pubblicare."
            exit 0
          fi
          git commit -m "Deploy docs [${GITHUB_SHA::8}]"
          git push
