---
name: Flamby Tests
run-name: flamby-tests

on:
  schedule:
    - cron: "0 1 * * 6"  # Run everyweekend at 1 am
  workflow_dispatch:
  push:
    branches:
      - 'develop'
      - 'master'

jobs:
  flamby-test:
    defaults:
      run:
        shell:  bash -l {0}
    name: Flamby Tests
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - ubuntu-22.04
          - macos-latest
          - fedora-38
          - macos-m1
        python-version:
          - '3.10'
    runs-on: ${{matrix.os}}
    steps:
      - name: Checkout
        id: flamby-checkout
        uses: actions/checkout@v4

      - name: Install Python using Pyenv
        uses: ./.github/actions/setup-fbm-env
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run flamby tests
        id: flamby-tests-with-pytest
        run: |
          tox -r -m flamby
        shell: bash -l {0}
