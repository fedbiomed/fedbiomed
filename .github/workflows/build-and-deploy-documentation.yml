name: Build and deploy docs to fedbiomed-docs-public

on:
  push:
    tags:
      - "*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build (ex. 6.0.0)"
        required: true
      alias:
        description: "Alias (ex. latest)"
        required: false
        default: ""

concurrency:
  group: docs-deploy
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout fedbiomed-docs (source)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout fedbiomed-docs-public (destination)
        uses: actions/checkout@v4
        with:
          repository: fedbiomed/fedbiomed-docs-public
          ssh-key: ${{ secrets.DOCS_DEPLOY_KEY }}
          path: output-repo

      - name: Add fedbiomed to PYTHONPATH
        run: echo "PYTHONPATH=$PYTHONPATH:$(pwd)" >> $GITHUB_ENV

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup PDM
        uses: pdm-project/setup-pdm@v4

      - name: Install Dependencies
        run: pdm install --no-default -G docs -G dev

      - name: Configure git
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "fedbiomed-bot@users.noreply.github.com"

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
            ALIAS="${{ github.event.inputs.alias }}"
          elif [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
            VERSION="${VERSION#v}"
            ALIAS="latest"
          else
            # Push to develop: re-deploy the current latest version
            VERSION=${GITHUB_REF#refs/*/}
            ALIAS="latest"
          fi
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
          echo "ALIAS=${ALIAS}" >> $GITHUB_OUTPUT
      
      - name: Checkout requested ref
        if: github.event_name == 'workflow_dispatch'
        run: |
          git fetch --tags
          git checkout "v${{ github.event.inputs.version }}"

      - name: Restore gh-pages from deployed state
        run: |
          # Save current ref before switching branches.
          HEAD_REF=$(git symbolic-ref --short HEAD 2>/dev/null || git rev-parse HEAD)
          # Seed the local gh-pages branch from the current output-repo so that
          # mike accumulates versions instead of starting from scratch each run.
          git checkout --orphan gh-pages
          git rm -rf . --quiet
          rsync -av --exclude='.git' output-repo/ .
          # Prevent output-repo (a nested git repo) from being added as a submodule.
          grep -qxF "output-repo" .gitignore || echo "output-repo" >> .gitignore
          git add -A
          git commit -m "Restore deployed state" --allow-empty --no-verify
          git checkout "$HEAD_REF"

      - name: Build docs with mike
        run: |
          pdm run mike deploy ${{ steps.version.outputs.VERSION }} ${{ steps.version.outputs.ALIAS }} --update-aliases
          if [ -n "${{ steps.version.outputs.ALIAS }}" ]; then
            pdm run mike set-default ${{ steps.version.outputs.ALIAS }}
          else
            pdm run mike set-default ${{ steps.version.outputs.VERSION }}
          fi

      - name: Export gh-pages to output-repo
        run: |
          git worktree add /tmp/built-site gh-pages
          # Override the root redirect generated by mike set-default.
          printf '<meta http-equiv="refresh" content="0; url=./latest/docs">\n' > /tmp/built-site/index.html
          rsync -avL --delete --exclude='.git' --exclude='CNAME' /tmp/built-site/ output-repo/

      - name: Restore CNAME
        run: echo "docs.fedbiomed.org" > output-repo/CNAME

      - name: Push to fedbiomed-docs-public
        run: |
          cd output-repo
          git add .
          if git diff --cached --quiet; then
            echo "Nessuna modifica da pubblicare."
            exit 0
          fi
          git commit -m "Deploy docs v${{ steps.version.outputs.VERSION }} [${GITHUB_SHA::8}]"
          git pull --rebase
          git push