---
name: Fed-BioMed Build Test
run-name: Fed-BioMed Build Test

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
    branches:
      - develop
      - master

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  run-tests:
    name: Run unit, MNIST, and documentation tests
    if: ${{ github.event.pull_request.draft == false }}
    uses: ./.github/workflows/fbm-generic-test.yml
    secrets: inherit
    with:
      python-versions: '["3.10","3.14"]'
      os-list: '["ubuntu-latest","macos-latest"]'
      run-docs: true
      run-unit: true
      run-mnist: true
      run-e2e: false
