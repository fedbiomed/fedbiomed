---
name: End-to-End Test
run-name: fedbiomed-e2e-tests
permissions: write-all
on:
  schedule:
    - cron: '0 1 * * *'  # Run every day at 1 am on default branch: develop
  workflow_dispatch:
    inputs:
      python-version:
        description: "Python version (e.g. 3.10). Leave empty for all."
        required: false
      os:
        description: "OS (e.g. ubuntu-latest). Leave empty for all."
        required: false
      
  push:
    branches:
      - 'master'
      
jobs:
  e2e-test-auto:
    name: e2e tests
    defaults:
      run:
        shell: bash -il {0}

    strategy:
      fail-fast: false
      matrix:
        os: ${{ github.event.inputs.os != '' && fromJson(github.event.inputs.os) || fromJson('["ubuntu-latest","ubuntu-22.04","macos-latest","macos-m1"]') }}
        python-version: ${{ github.event.inputs.python-version != '' && fromJson(github.event.inputs.python-version) || fromJson('["3.10","3.11"]') }}
    
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout of head
        id: e2e-checkout
        uses: actions/checkout@v4

      - name: Install Python using Pyenv
        uses: ./.github/actions/setup-fbm-env
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run end-to-end tests
        id: e2e-tests-with-pytest
        run: |
          FEDBIOMED_E2E_DATA_PATH=$HOME/Data/fedbiomed tox \
            -r -m e2e
        shell: bash -il {0}