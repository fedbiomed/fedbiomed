---
name: Dependency Environment Probe
run-name: dependency-environment-probe

on:
  push:
    branches:
      - 'poc/dependency-management-tests'
  workflow_dispatch:
    inputs:
      python-version:
        description: "Python version to probe"
        required: true
        default: "3.12"
      os:
        description: "Runner OS"
        required: true
        default: "ubuntu-latest"
      optional-groups:
        description: "Comma-separated project optional dependency groups"
        required: false
        default: "researcher"
      dependency-groups:
        description: "Comma-separated dependency groups from pyproject.toml"
        required: false
        default: "test"
      attempt-project-install:
        description: "Also try installing the project with --no-deps"
        required: false
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  probe:
    name: Probe dependencies on Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ fromJSON(github.event_name == 'workflow_dispatch' && format('["{0}"]', inputs.python-version) || '["3.12","3.13","3.14"]') }}
        os: ${{ fromJSON(github.event_name == 'workflow_dispatch' && format('["{0}"]', inputs.os) || '["ubuntu-latest"]') }}
    defaults:
      run:
        shell: bash -l {0}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Fed-BioMed Test Environment
        uses: ./.github/actions/setup-fbm-env
        with:
          python-version: ${{ matrix.python-version }}

      - name: Create dependency requirements
        run: |
          mkdir -p env-probe
          python - <<'PY'
          from pathlib import Path

          try:
              import tomllib
          except ModuleNotFoundError:
              import subprocess
              import sys

              subprocess.check_call([sys.executable, "-m", "pip", "install", "tomli"])
              import tomli as tomllib

          data = tomllib.loads(Path("pyproject.toml").read_text())
          dependencies = list(data["project"]["dependencies"])
          optional = data["project"].get("optional-dependencies", {})
          dependency_groups = data.get("dependency-groups", {})
          requested_optional_groups = [
              group.strip()
              for group in "${{ inputs.optional-groups || 'researcher' }}".split(",")
              if group.strip()
          ]
          requested_dependency_groups = [
              group.strip()
              for group in "${{ inputs.dependency-groups || 'test' }}".split(",")
              if group.strip()
          ]

          missing_optional_groups = sorted(set(requested_optional_groups) - set(optional))
          missing_dependency_groups = sorted(
              set(requested_dependency_groups) - set(dependency_groups)
          )
          for group in requested_optional_groups:
              dependencies.extend(optional.get(group, []))
          for group in requested_dependency_groups:
              dependencies.extend(dependency_groups.get(group, []))

          Path("env-probe/requirements.in").write_text(
              "\n".join(dependencies) + "\n",
              encoding="utf-8",
          )
          Path("env-probe/requested-optional-groups.txt").write_text(
              "\n".join(requested_optional_groups) + "\n",
              encoding="utf-8",
          )
          Path("env-probe/requested-dependency-groups.txt").write_text(
              "\n".join(requested_dependency_groups) + "\n",
              encoding="utf-8",
          )
          Path("env-probe/missing-optional-groups.txt").write_text(
              "\n".join(missing_optional_groups) + "\n",
              encoding="utf-8",
          )
          Path("env-probe/missing-dependency-groups.txt").write_text(
              "\n".join(missing_dependency_groups) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Record initial Python environment
        run: |
          python --version | tee env-probe/python-version.txt
          python -m pip --version | tee env-probe/pip-version.txt
          python -m pip list --format=json > env-probe/pip-list-initial.json

      - name: Install declared dependencies
        run: |
          set +e
          python -m pip install --upgrade pip setuptools wheel \
            > env-probe/bootstrap.log 2>&1
          BOOTSTRAP_EXIT=$?

          python -m pip install --dry-run --report env-probe/pip-dry-run-report.json \
            -r env-probe/requirements.in \
            > env-probe/pip-dry-run.log 2>&1
          DRY_RUN_EXIT=$?

          python -m pip install --report env-probe/pip-install-report.json \
            -r env-probe/requirements.in \
            > env-probe/pip-install.log 2>&1
          INSTALL_EXIT=$?

          {
            echo "bootstrap_exit=${BOOTSTRAP_EXIT}"
            echo "dry_run_exit=${DRY_RUN_EXIT}"
            echo "install_exit=${INSTALL_EXIT}"
          } | tee env-probe/install-status.env

          exit 0

      - name: Try project install without dependencies
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.attempt-project-install }}
        run: |
          set +e
          python -m pip install --no-deps . \
            > env-probe/project-install.log 2>&1
          echo "project_install_exit=$?" | tee env-probe/project-install-status.env
          exit 0

      - name: Run unit tests
        run: |
          set +e
          python -m pytest -s -vv \
            --maxfail=0 \
            --continue-on-collection-errors \
            --cov=fedbiomed \
            --cov-append \
            --cov-report=term-missing \
            --cov-report=xml:env-probe/coverage.xml \
            --junitxml=env-probe/unit-tests-junit.xml \
            tests \
            > env-probe/unit-tests.log 2>&1
          UNIT_TESTS_EXIT=$?
          echo "unit_tests_exit=${UNIT_TESTS_EXIT}" | tee env-probe/unit-tests-status.env
          exit ${UNIT_TESTS_EXIT}

      - name: Record final Python environment
        if: always()
        run: |
          set +e
          python -m pip freeze --all > env-probe/pip-freeze.txt
          python -m pip list --format=json > env-probe/pip-list-final.json
          python -m pip check > env-probe/pip-check.txt 2>&1
          echo "pip_check_exit=$?" | tee env-probe/pip-check-status.env
          python - <<'PY' > env-probe/wheel-tag-diagnostics.txt
          from importlib import metadata

          lines = []
          for distribution in sorted(
              metadata.distributions(),
              key=lambda item: (item.metadata.get("Name") or "").lower(),
          ):
              name = distribution.metadata.get("Name", "<unknown>")
              version = distribution.version
              wheel = distribution.read_text("WHEEL")
              if wheel is None:
                  continue
              for line in wheel.splitlines():
                  if not line.startswith("Tag: "):
                      continue
                  tag = line.removeprefix("Tag: ")
                  if len(tag.split("-")) != 3:
                      lines.append(f"{name}=={version}: invalid wheel tag {tag!r}")

          if not lines:
              lines.append("No malformed wheel tags found.")
          print("\n".join(lines))
          PY
          exit 0

      - name: Write summary
        if: always()
        run: |
          {
            echo "## Dependency Environment Probe"
            echo
            echo "- Python: \`${{ matrix.python-version }}\`"
            echo "- OS: \`${{ matrix.os }}\`"
            echo "- Optional groups: \`${{ inputs.optional-groups || 'researcher' }}\`"
            echo "- Dependency groups: \`${{ inputs.dependency-groups || 'test' }}\`"
            echo
            echo "### Install status"
            echo
            if [ -f env-probe/install-status.env ]; then
              sed 's/^/- /' env-probe/install-status.env
            else
              echo "- install-status.env was not created"
            fi
            echo
            echo "### Project install status"
            echo
            if [ -f env-probe/project-install-status.env ]; then
              sed 's/^/- /' env-probe/project-install-status.env
            else
              echo "- project install was skipped or did not run"
            fi
            echo
            echo "### Unit test status"
            echo
            if [ -f env-probe/unit-tests-status.env ]; then
              sed 's/^/- /' env-probe/unit-tests-status.env
            else
              echo "- unit tests did not run"
            fi
            echo
            echo "Download the uploaded \`dependency-env-probe-*\` artifact for full"
            echo "pip reports, install logs, unit test logs, \`pip freeze\`,"
            echo "\`pip list\`, and \`pip check\` output."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload environment probe artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-env-probe-${{ matrix.os }}-py${{ matrix.python-version }}
          path: env-probe/
          if-no-files-found: error
