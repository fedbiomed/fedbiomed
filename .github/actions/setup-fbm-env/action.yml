---
name: "Setup Fed-BioMed Test Environment"
description: Install the requested Python interpreter and tox

inputs:
  python-version:
    description: Python version to install
    required: true

runs:
  using: composite
  steps:
    - name: Detect runner package manager
      id: runner
      shell: bash -l {0}
      run: |
        OS_ID=""
        if [[ -f /etc/os-release ]]; then
          OS_ID=$(grep '^ID=' /etc/os-release | cut -d= -f2 | tr -d '"')
        fi

        IS_FEDORA=false
        if [[ "$OS_ID" == "fedora" ]]; then
          IS_FEDORA=true
        fi

        USE_BREW=false
        if [[ "${{ runner.environment }}" == "self-hosted" && \
              "${{ runner.os }}" == "macOS" ]]; then
          USE_BREW=true
        fi

        echo "is_fedora=$IS_FEDORA" >> "$GITHUB_OUTPUT"
        echo "use_brew=$USE_BREW" >> "$GITHUB_OUTPUT"

    - name: Install Python with setup-python
      if: steps.runner.outputs.is_fedora == 'false' && steps.runner.outputs.use_brew == 'false'
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}
        cache: pip

    - name: Install Python on self-hosted Fedora
      if: steps.runner.outputs.is_fedora == 'true'
      shell: bash -l {0}
      run: |
        sudo dnf install -y "python${{ inputs.python-version }}"
        PYTHON_BIN=$(command -v "python${{ inputs.python-version }}")
        sudo ln -sf "$PYTHON_BIN" /usr/local/bin/python
        python -m ensurepip --upgrade

    - name: Install Python on self-hosted Apple Silicon
      if: steps.runner.outputs.use_brew == 'true'
      shell: bash -l {0}
      run: |
        VERSION="${{ inputs.python-version }}"
        if ! arch -arm64 brew list --versions "python@$VERSION" >/dev/null; then
          arch -arm64 brew install "python@$VERSION"
        fi

        PYTHON_PREFIX=$(arch -arm64 brew --prefix "python@$VERSION")
        sudo ln -sf "$PYTHON_PREFIX/bin/python$VERSION" /usr/local/bin/python
        python -m ensurepip --upgrade
        echo "$PYTHON_PREFIX/bin" >> "$GITHUB_PATH"
        echo "$PYTHON_PREFIX/libexec/bin" >> "$GITHUB_PATH"

    - name: Validate Python installation
      shell: bash -l {0}
      run: |
        EXPECTED="${{ inputs.python-version }}"
        ACTUAL=$(python -c 'import sys; print(f"{sys.version_info.major}.{sys.version_info.minor}")')
        test "$ACTUAL" = "$EXPECTED"
        python --version
        python -m pip --version
        echo "Runner OS: ${{ runner.os }}"
        uname -a
        python -c "import platform; print('Architecture:', platform.machine())"

    - name: Install tox
      shell: bash -l {0}
      run: python -m pip install tox

    - name: Check tox
      shell: bash -l {0}
      run: tox --version
