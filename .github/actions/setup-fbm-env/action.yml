---
name: "Setup Fed-BioMed Test Environment"
description: Install the requested Python interpreter and tox

inputs:
  python-version:
    description: Python version to install
    required: true

runs:
  using: composite
  steps:
    - name: Detect runner package manager
      id: runner
      shell: bash -l {0}
      run: |
        OS_ID=""
        if [[ -f /etc/os-release ]]; then
          OS_ID=$(grep '^ID=' /etc/os-release | cut -d= -f2 | tr -d '"')
        fi

        IS_FEDORA=false
        if [[ "$OS_ID" == "fedora" ]]; then
          IS_FEDORA=true
        fi

        USE_BREW=false
        if [[ "${{ runner.environment }}" == "self-hosted" && \
              "${{ runner.os }}" == "macOS" ]]; then
          USE_BREW=true
        fi

        echo "is_fedora=$IS_FEDORA" >> "$GITHUB_OUTPUT"
        echo "use_brew=$USE_BREW" >> "$GITHUB_OUTPUT"

    - name: Install Python with setup-python
      id: setup_python
      if: steps.runner.outputs.is_fedora == 'false' && steps.runner.outputs.use_brew == 'false'
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}
        cache: pip

    - name: Export hosted Python executable
      if: steps.runner.outputs.is_fedora == 'false' && steps.runner.outputs.use_brew == 'false'
      shell: bash -l {0}
      run: |
        PYTHON_BIN="${{ steps.setup_python.outputs.python-path }}"
        test -x "$PYTHON_BIN"
        echo "FEDBIOMED_PYTHON_BIN=$PYTHON_BIN" >> "$GITHUB_ENV"

    - name: Install Python on self-hosted Fedora
      if: steps.runner.outputs.is_fedora == 'true'
      shell: bash -l {0}
      run: |
        sudo dnf install -y "python${{ inputs.python-version }}"
        PYTHON_BIN=$(command -v "python${{ inputs.python-version }}")
        sudo ln -sf "$PYTHON_BIN" /usr/local/bin/python
        "$PYTHON_BIN" -m ensurepip --upgrade
        echo "FEDBIOMED_PYTHON_BIN=$PYTHON_BIN" >> "$GITHUB_ENV"

    - name: Install Python on self-hosted Apple Silicon
      if: steps.runner.outputs.use_brew == 'true'
      shell: bash -l {0}
      run: |
        VERSION="${{ inputs.python-version }}"
        if ! arch -arm64 brew list --versions "python@$VERSION" >/dev/null; then
          arch -arm64 brew install "python@$VERSION"
        fi

        PYTHON_PREFIX=$(arch -arm64 brew --prefix "python@$VERSION")
        PYTHON_BIN="$PYTHON_PREFIX/bin/python$VERSION"
        sudo ln -sf "$PYTHON_BIN" /usr/local/bin/python
        "$PYTHON_BIN" -m ensurepip --upgrade
        echo "FEDBIOMED_PYTHON_BIN=$PYTHON_BIN" >> "$GITHUB_ENV"
        echo "$PYTHON_PREFIX/bin" >> "$GITHUB_PATH"
        echo "$PYTHON_PREFIX/libexec/bin" >> "$GITHUB_PATH"

    - name: Validate Python installation
      shell: bash -l {0}
      run: |
        EXPECTED="${{ inputs.python-version }}"
        PYTHON_BIN="${FEDBIOMED_PYTHON_BIN:-$(command -v python)}"
        ACTUAL=$("$PYTHON_BIN" -c 'import sys; print(f"{sys.version_info.major}.{sys.version_info.minor}")')
        test "$ACTUAL" = "$EXPECTED"
        PYTHON_BIN=$("$PYTHON_BIN" -c 'import os, sys; print(os.path.realpath(sys.executable))')
        echo "FEDBIOMED_PYTHON_BIN=$PYTHON_BIN" >> "$GITHUB_ENV"
        "$PYTHON_BIN" --version
        "$PYTHON_BIN" -m pip --version
        echo "Python executable: $PYTHON_BIN"
        echo "Runner OS: ${{ runner.os }}"
        uname -a
        "$PYTHON_BIN" -c "import platform; print('Architecture:', platform.machine())"

    - name: Install tox
      shell: bash -l {0}
      run: |
        TOX_VENV=$(mktemp -d "${RUNNER_TEMP:-/tmp}/fedbiomed-tox-XXXXXXXX")
        "$FEDBIOMED_PYTHON_BIN" -m venv "$TOX_VENV"
        "$TOX_VENV/bin/python" -m pip install tox
        echo "$TOX_VENV/bin" >> "$GITHUB_PATH"

    - name: Check tox
      shell: bash -l {0}
      run: tox --version
